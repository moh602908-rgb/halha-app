<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>دلّني AI — حلول ذكية للحياة اليومية</title>
<meta name="description" content="دلّني AI: أدلة عملية ومساعد ذكي لحل أكثر مشاكل الحياة اليومية شيوعًا، بالعربية." />
<meta name="theme-color" content="#0F5257" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar__inner">
    <button class="back-btn" id="backBtn" aria-label="رجوع" hidden>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="logo-block">
      <h1 class="logo">دلّني <span class="logo-ai">AI</span></h1>
      <p class="logo-sub">حلول ذكية للحياة اليومية</p>
    </div>
  </div>
</header>

<main id="app"></main>

<footer class="app-footer">دلّني AI • الإصدار v0.5.0</footer>

<button class="fab" id="assistantFab">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 5.94 2 10.8c0 2.77 1.47 5.23 3.78 6.85-.12.9-.5 2.5-1.53 3.9 0 0 2.55-.28 4.6-1.87 1 .27 2.06.42 3.15.42 5.52 0 10-3.94 10-8.8S17.52 2 12 2Z" fill="currentColor"/></svg>
  <span>اسأل المساعد</span>
</button>

<div class="sheet-overlay" id="sheetOverlay"></div>
<section class="sheet" id="assistantSheet" aria-hidden="true">
  <div class="sheet__handle"></div>
  <div class="sheet__header">
    <h2 class="sheet__title">مساعد دلّني</h2>
    <span class="sheet__quota" id="quotaBadge"></span>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-bubble chat-bubble--bot">
      أهلًا 👋 اسألني عن أي مشكلة يومية وسأحاول مساعدتك مباشرة.
    </div>
  </div>
  <form class="chat-form" id="chatForm">
    <input type="text" id="chatInput" placeholder="اكتب سؤالك هنا..." autocomplete="off" />
    <button type="submit" class="chat-send" id="chatSend" aria-label="إرسال">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 12H20M20 12L14 6M20 12L14 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </form>
</section>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
