<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>دلّني AI — حلول ذكية للحياة اليومية</title>
<meta name="description" content="دلّني AI: أدلة عملية خطوة بخطوة لحل أكثر مشاكل الحياة اليومية شيوعًا، بالعربية." />
<meta name="theme-color" content="#0F5257" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar__inner">
    <button class="back-btn" id="backBtn" aria-label="رجوع" hidden>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="logo-block">
      <h1 class="logo">دلّني <span class="logo-ai">AI</span></h1>
      <p class="logo-sub">حلول ذكية للحياة اليومية</p>
    </div>
  </div>
</header>

<main id="app"></main>

<footer class="app-footer">دلّني AI • الإصدار v1.1.0</footer>

<button class="fab" id="assistantFab">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 5.94 2 10.8c0 2.77 1.47 5.23 3.78 6.85-.12.9-.5 2.5-1.53 3.9 0 0 2.55-.28 4.6-1.87 1 .27 2.06.42 3.15.42 5.52 0 10-3.94 10-8.8S17.52 2 12 2Z" fill="currentColor"/></svg>
  <span>اسأل المساعد</span>
</button>

<div class="sheet-overlay" id="sheetOverlay"></div>
<section class="sheet" id="assistantSheet" aria-hidden="true">
  <div class="sheet__handle"></div>
  <div class="sheet__header">
    <h2 class="sheet__title">مساعد دلّني</h2>
    <span class="sheet__badge">🤖 الذكاء الاصطناعي قريبًا</span>
  </div>
  <div class="assistant-body">
    <p class="assistant-welcome">
      أهلًا 👋 أنا مساعد دلّني. في هذه النسخة أساعدك على الوصول السريع لأكثر المشاكل شيوعًا.
      في المرحلة القادمة سأصبح مساعدًا ذكيًا يجيب مباشرة عن أي سؤال تكتبه.
    </p>
    <div class="assistant-search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" id="assistantSearchInput" placeholder="ابحث في كل الأدلة..." autocomplete="off" />
    </div>
    <div class="section-title section-title--sheet" id="assistantListLabel">أكثر الأدلة استخدامًا</div>
    <div class="guide-list" id="assistantQuickList"></div>
  </div>
</section>

<script src="app.js"></script>
<script>
/* تسجيل الـ Service Worker + إجبار المتصفح على اكتشاف التحديثات فورًا.

   updateViaCache: "none" يمنع المتصفح من الاعتماد على أي نسخة مخزنة من
   sw.js نفسه عند فحص وجود تحديث؛ فحص التحديث دائمًا يذهب فعليًا للخادم.

   عند اكتشاف نسخة جديدة أصبحت هي المتحكمة (controllerchange)، نعيد تحميل
   الصفحة تلقائيًا مرة واحدة فقط، حتى تظهر أحدث نسخة للمستخدم فورًا دون
   الحاجة لتحديث يدوي أو مسح بيانات الموقع. */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then((reg) => {
      // اطلب فحص تحديث فوري عند كل تحميل للصفحة، بدل انتظار الفحص الدوري للمتصفح.
      reg.update().catch(() => {});
    }).catch(() => {});

    let hasReloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (hasReloaded) return; // منع حلقة تحديث متكررة
      hasReloaded = true;
      window.location.reload();
    });
  });
}
</script>
</body>
</html>
